name: Compile TWRP 12.1 for TCL Tab 10L

on:
  workflow_dispatch: # Allows you to start the build manually with a button click

jobs:
  build:
    runs-on: ubuntu-latest # Uses GitHub's hosted virtual machine

    steps:
    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get clean

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://googleapis.com > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Sync TWRP Source Code
      run: |
        git config --global user.name "Builder"
        git config --global user.email "builder@local.com"
        mkdir twrp && cd twrp
        repo init --depth=1 -u https://github.com -b twrp-12.1
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clone Custom Device Tree
      run: |
        cd twrp
        # REPLACE THE URL BELOW WITH YOUR ACTUAL DEVICE TREE GITHUB REPOSITORY
        git clone https://github.com -b twrp-12.1 device/tcl/tb8766p1_64_bsp

    - name: Execute Compilation
      run: |
        cd twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch twrp_tb8766p1_64_bsp-eng
        make recoveryimage -j$(nproc --all)

    - name: Upload Recovery Image Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Recovery-Image
        path: twrp/out/target/product/tb8766p1_64_bsp/recovery.img
